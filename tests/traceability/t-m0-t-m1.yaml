    requirement_ids: [RT-06]
    classification: COVERAGE_GAP
  - test_case_id: RUNTIME-010
    requirement_ids: [RT-09]
    classification: COVERAGE_GAP
  - test_case_id: RUNTIME-011
    requirement_ids: [RT-09]
    classification: COVERAGE_GAP
  - test_case_id: RUNTIME-015
    requirement_ids: [RT-10, RT-11]
    classification: COVERAGE_GAP
  - test_case_id: RUNTIME-016
    requirement_ids: [RT-12]
    classification: COVERAGE_GAP

contract_ambiguities:
  - requirement_ids: []
    topic: Contract freeze status
    detail: Work packet states Contracts are frozen, while Requirements, OpenAPI, state machine, and runtime cases are each labelled Draft v0.1.
  - requirement_ids: [RT-06]
    topic: Restart idempotency
    detail: Runtime state machine defines Start/Stop idempotency but no Restart idempotent response.
  - requirement_ids: [RT-01, RT-02]
    topic: Instance Registry configuration
    detail: Bundle freezes DEFAULT_INSTANCE_ID but not a multi-instance registry file/schema; RUNTIME-014 therefore runs in a separate Controller phase.
  - requirement_ids: [RT-09]
    topic: LLM probe protocol
    detail: OD-03 remains open; Fixture exposes deterministic health, models, and chat probes, but the Contract does not freeze which request Controller must use.
  - requirement_ids: [RT-05, NF-05]
    topic: Persistence evidence scope
    detail: RUNTIME-014 Expected Result is a Fixture marker, narrower than NF-05 Portal-and-Hermes record persistence, and AgentInstance has no lifecycle operation evidence field.

