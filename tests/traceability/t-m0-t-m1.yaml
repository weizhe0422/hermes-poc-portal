  note: A passed row accepts only the Frozen YAML Case slice; it does not imply full cross-component or future-milestone Requirement completion.

coverage_gaps:
  - classification: COVERAGE_GAP
    test_case_ids: [RUNTIME-002, RUNTIME-010, RUNTIME-011, RUNTIME-015, RUNTIME-016]
    detail: These Matrix-referenced Runtime IDs are outside the Frozen 21-case list and have no YAML Expected in the Bundle; no assertion is inferred.
  - classification: COVERAGE_GAP
    test_case_ids: [BUILD-001, BUILD-002, BUILD-003, BUILD-004, BUILD-005, BUILD-006]
    requirement_ids: [BLD-01, BLD-02, BLD-03, BLD-04, BLD-05, BLD-06]
    detail: Matrix-only platform/image cases are outside the Frozen 21-case list; Runner image build does not claim production-image acceptance.
  - classification: COVERAGE_GAP
    requirement_ids: [RT-01, RT-03, RT-04, RT-05]
    detail: Frozen Runtime cases exercise the Controller boundary; Portal operator/display product flows remain outside this M0/M1 Contract scope.
  - classification: COVERAGE_GAP
    requirement_ids: [RT-09]
    detail: AgentInstance health fields are asserted, but OD-03 does not freeze an independently observable LLM probe protocol.
  - classification: COVERAGE_GAP
    requirement_ids: [BLD-08, NF-03]
    detail: Artifact scan checks text, binary bytes, and ZIP members for synthetic secrets but does not OCR screenshot or video pixels.
  - classification: COVERAGE_GAP
    detail: Base image/package versions support mirror overrides, but the Frozen Contract does not publish approved internal registry digests or a closed-network build environment.

contract_questions:
  - test_case_id: RUNTIME-009
    requirement_ids: [RT-08]
    classification: CONTRACT_AMBIGUITY
    detail: Frozen Runtime Expected names error_code; AgentInstance schema publishes last_error_code, but no Contract maps the two fields. The runner must not guess this mapping.
  - test_case_id: RUNTIME-008
    requirement_ids: [RT-07]
    classification: CONTRACT_AMBIGUITY
    detail: Frozen Expected requires one accepted operation and one conflict but does not define whether concurrent Start or Stop must win.
