# 文件目的：定義Hermes Runtime可觀察狀態、事件、合法轉移、冪等行為及錯誤語意；Portal、Controller與E2E均須遵守。
# Contract只能限制外部可觀察行為，不得要求平台一定使用Docker Event、Polling或特定內部實作。
# 適用角色：平台實作者、測試實作者、功能測試執行者。
# 狀態：Frozen v0.2.0。

contract_version: 0.2.0
initial_state: NOT_PROVISIONED

states:
  NOT_PROVISIONED:
    description: Hermes Container不存在或不符合受管Instance識別。
  STOPPED:
    description: 受管Container存在但未執行。
  STARTING:
    description: Start已接受，等待Container、Hermes與LLM健康檢查。
  HEALTHY:
    description: Container Running，Hermes API與核准LLM Probe均成功。
  UNHEALTHY:
    description: Container Running，但Hermes或LLM健康檢查失敗。
  STOPPING:
    description: Stop或Restart的第一階段已接受，等待Container停止。
  ERROR:
    description: Lifecycle操作失敗或逾時，且錯誤已被保存。

events:
  PROVISION_DISCOVERED: {}
  START_REQUESTED: {}
  START_SUCCEEDED: {}
  START_HEALTH_FAILED: {}
  START_TIMEOUT: {}
  STOP_REQUESTED: {}
  STOP_SUCCEEDED: {}
  STOP_FAILED: {}
  RESTART_REQUESTED: {}
  HEALTH_RECOVERED: {}
  HEALTH_LOST: {}
  INSTANCE_REMOVED_EXTERNALLY: {}

transitions:
  - from: NOT_PROVISIONED
    event: PROVISION_DISCOVERED
    to: STOPPED
  - from: STOPPED
    event: START_REQUESTED
    to: STARTING
    action: START
    http_status: 202
  - from: STARTING
    event: START_SUCCEEDED
    to: HEALTHY
  - from: STARTING
    event: START_HEALTH_FAILED
    to: UNHEALTHY
  - from: STARTING
    event: START_TIMEOUT
    to: ERROR
  - from: HEALTHY
    event: STOP_REQUESTED
    to: STOPPING
    action: STOP
    http_status: 202
  - from: UNHEALTHY
    event: STOP_REQUESTED
    to: STOPPING
    action: STOP
    http_status: 202
  - from: ERROR
    event: STOP_REQUESTED
    to: STOPPING
    action: STOP
    http_status: 202
  - from: STOPPING
    event: STOP_SUCCEEDED
    to: STOPPED
  - from: STOPPING
    event: STOP_FAILED
    to: ERROR
  - from: HEALTHY
    event: RESTART_REQUESTED
    to: STOPPING
    action: RESTART
    http_status: 202
    continuation: START_REQUESTED
  - from: UNHEALTHY
    event: RESTART_REQUESTED
    to: STOPPING
    action: RESTART
    http_status: 202
    continuation: START_REQUESTED
  - from: ERROR
    event: RESTART_REQUESTED
    to: STOPPING
    action: RESTART
    http_status: 202
    continuation: START_REQUESTED
  - from: UNHEALTHY
    event: HEALTH_RECOVERED
    to: HEALTHY
  - from: HEALTHY
    event: HEALTH_LOST
    to: UNHEALTHY
  - from: STOPPED
    event: INSTANCE_REMOVED_EXTERNALLY
    to: NOT_PROVISIONED
  - from: HEALTHY
    event: INSTANCE_REMOVED_EXTERNALLY
    to: NOT_PROVISIONED
  - from: UNHEALTHY
    event: INSTANCE_REMOVED_EXTERNALLY
    to: NOT_PROVISIONED
  - from: ERROR
    event: INSTANCE_REMOVED_EXTERNALLY
    to: NOT_PROVISIONED

idempotency_rules:
  - rule: START_IDEMPOTENCY
    current_state: HEALTHY
    requested_action: START
    http_status: 200
    result: NO_OP_ALREADY_STARTED
  - rule: STOP_IDEMPOTENCY
    current_state: STOPPED
    requested_action: STOP
    http_status: 200
    result: NO_OP_ALREADY_STOPPED
  - rule: RESTART_IDEMPOTENCY_WINDOW
    description: "Restart冪等窗口從首次接受開始，到HEALTHY、UNHEALTHY或ERROR終態為止，不以固定秒數決定。(註：Restart的Stop與Start階段仍受對應Timeout限制，只是不另外使用固定時間判斷重複Restart)"

contextual_idempotency_rules:
  - description: "若current operation.action與requested action均為相同Lifecycle，且Operation尚未終止，優先適用EXISTING_OPERATION，不得被一般invalid rule判成409。"
    current_operation_action: START
    requested_action: START
    allowed_states: [STARTING]
    http_status: 202
    result: EXISTING_OPERATION
    requires_same_operation_id: true
  - description: "相同Stop仍在執行"
    current_operation_action: STOP
    requested_action: STOP
    allowed_states: [STOPPING]
    http_status: 202
    result: EXISTING_OPERATION
    requires_same_operation_id: true
  - description: "相同Restart仍在執行"
    current_operation_action: RESTART
    requested_action: RESTART
    allowed_states: [STOPPING, STARTING]
    http_status: 202
    result: EXISTING_OPERATION
    requires_same_operation_id: true

invalid_requests:
  - state: NOT_PROVISIONED
    actions: [START, STOP, RESTART]
    http_status: 404
    error_code: INSTANCE_NOT_FOUND
  - state: STOPPED
    actions: [RESTART]
    http_status: 409
    error_code: INVALID_STATE_TRANSITION
  - state: STARTING
    actions: [STOP, RESTART]
    http_status: 409
    error_code: OPERATION_CONFLICT
    condition: "requested_action != current_operation_action"
  - state: STOPPING
    actions: [START, STOP, RESTART]
    http_status: 409
    error_code: OPERATION_CONFLICT
    condition: "requested_action != current_operation_action"

health_contract:
  healthy_requires:
    - container_status == RUNNING
    - hermes_status == AVAILABLE
    - llm_status == AVAILABLE
  container_running_alone_is_not_healthy: true

operation_rules:
  one_operation_per_instance: true
  restart_preserves_volumes: true
  start_never_creates_arbitrary_instance: true
