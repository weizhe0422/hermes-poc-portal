# 文件目的：定義PoC所有可配置環境變數、Port、Network與Volume；實作不得將這些值寫死。
# 適用角色：平台實作者、測試實作者、環境管理者、功能測試執行者。
# 狀態：Draft v0.1；Secret只定義名稱，不在本檔提供值。

contract_version: 0.1.0

environment_variables:
  PORTAL_PORT:
    required: true
    secret: false
    default: "8080"
  PORTAL_DATABASE_URL:
    required: true
    secret: false
    default: "sqlite:////data/portal.db"
  DEFAULT_INSTANCE_ID:
    required: true
    secret: false
    default: "hermes-poc-001"
  CONTROLLER_BASE_URL:
    required: true
    secret: false
    default: "http://controller:8090"
  HERMES_BASE_URL:
    required: true
    secret: false
    default: "http://hermes:8000"
  HERMES_HEALTH_PATH:
    required: true
    secret: false
    default: "/health"
  HERMES_LLM_BASE_URL:
    required: true
    secret: false
    default: null
  HERMES_LLM_API_KEY:
    required: false
    secret: true
    default: null
  HERMES_MODEL_NAME:
    required: true
    secret: false
    default: null
  HERMES_START_TIMEOUT_SECONDS:
    required: true
    secret: false
    default: "120"
  HERMES_STOP_TIMEOUT_SECONDS:
    required: true
    secret: false
    default: "30"
  AGENT_REQUEST_TIMEOUT_SECONDS:
    required: true
    secret: false
    default: "90"
  CONTROLLER_MANAGED_LABEL:
    required: true
    secret: false
    default: "poc.managed=true"
  LOG_LEVEL:
    required: true
    secret: false
    default: "INFO"
  SPEC_VERSION:
    required: true
    secret: false
    default: "0.1.0"

ports:
  portal:
    container: 8080
    publish_to_host: true
  controller:
    container: 8090
    publish_to_host: false
  hermes:
    container: 8000
    publish_to_host: false

networks:
  portal-network:
    members: [portal, controller]
  agent-network:
    members: [portal, controller, hermes]
  e2e-network:
    members: [portal, portal-e2e-runner]
  controller-e2e-network:
    members: [controller-under-test, controller-e2e-runner]
  docker-engine-test-network:
    members: [controller-under-test, docker-engine-test]

volumes:
  portal-data:
    consumers: [portal]
    mode: read_write
  hermes-state:
    consumers: [hermes]
    mode: read_write
  knowledge-control-wafer:
    consumers: [hermes]
    mode: read_only
  knowledge-deployment:
    consumers: [hermes]
    mode: read_only
  verified-skills:
    consumers: [hermes]
    mode: read_only
  test-results:
    consumers: [portal-e2e-runner, controller-e2e-runner]
    mode: read_write

forbidden_configuration:
  - portal_mounts_docker_socket
  - runner_mounts_docker_socket
  - hermes_publishes_host_port
  - controller_publishes_host_port
  - knowledge_is_writable
  - verified_skills_are_writable
  - secret_in_image_or_repository
